<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>PharmaTrack - Inventory</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #f0fdfa, #d1fae5, #a7f3d0);
            font-family: 'Segoe UI', sans-serif;
        }
        .navbar {
            background: linear-gradient(90deg, #0f766e, #14b8a6) !important;
        }
        .inventory-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            padding: 25px;
        }
        .form-control {
            border-radius: 12px;
            height: 48px;
        }
        .btn-add {
            background: #14b8a6;
            border: none;
            border-radius: 12px;
            transition: all 0.3s;
        }
        .btn-add:hover {
            background: #0f766e;
            transform: translateY(-2px);
        }
        .table th {
            background: #14b8a6;
            color: white;
        }
        .alert-expired {
            background: #fecaca;
            border-color: #ef4444;
        }
        .alert-expiring {
            background: #fef08a;
            border-color: #eab308;
        }
        .emoji-alert {
            font-size: 1.5rem;
            margin-right: 10px;
        }
    </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-dark shadow-sm">
    <div class="container">
        <span class="navbar-brand fw-bold"><i class="bi bi-capsule-pill me-2"></i> PharmaTrack - <span th:text="${pharmacyName}"></span></span>
        <a href="/logout" class="btn btn-outline-light"><i class="bi bi-box-arrow-right me-1"></i> Logout</a>
    </div>
</nav>

<div class="container mt-5">
    <div class="inventory-card">

        <h2 class="mb-4 text-center text-teal fw-bold"><i class="bi bi-list-check me-2"></i> Your Medicine Inventory</h2>

        <!-- Add Medicine Form -->
        <form th:action="@{/add}" th:object="${newMedicine}" method="post" class="row g-3 mb-5">
            <div class="col-md-4">
                <input type="text" th:field="*{name}" class="form-control" placeholder="Medicine Name" required>
            </div>
            <div class="col-md-3">
                <input type="number" th:field="*{quantity}" class="form-control" placeholder="Quantity" required>
            </div>
            <div class="col-md-3">
                <input type="date" th:field="*{expiryDate}" class="form-control" required>
            </div>
            <div class="col-md-2">
                <button type="submit" class="btn btn-add text-white w-100"><i class="bi bi-plus-circle me-1"></i> Add</button>
            </div>
        </form>

        <!-- Alerts for Expiring/Expired -->
        <div th:if="${#lists.size(expired) > 0}" class="alert alert-expired d-flex align-items-center mb-4">
            <span class="emoji-alert">⚠️</span>
            <div>
                <strong>Expired Medicines:</strong>
                <ul th:each="med : ${expired}">
                    <li th:text="${med.name} + ' expired on ' + ${med.expiryDate}"></li>
                </ul>
            </div>
        </div>

        <div th:if="${#lists.size(expiringSoon) > 0}" class="alert alert-expiring d-flex align-items-center mb-4">
            <span class="emoji-alert">⏰</span>
            <div>
                <strong>Expiring Soon (within 30 days):</strong>
                <ul th:each="med : ${expiringSoon}">
                    <li th:text="${med.name} + ' expires on ' + ${med.expiryDate}"></li>
                </ul>
            </div>
        </div>

        <!-- Medicines Table -->
        <h3 class="mb-3">All Medicines</h3>
        <table class="table table-striped table-hover rounded overflow-hidden">
            <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Quantity</th>
                <th>Expiry Date</th>
                <th>Status</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="med : ${medicines}"
                th:classappend="${med.isExpired()} ? 'table-danger' : ${med.isExpiringSoon()} ? 'table-warning' : ''">
                <td th:text="${med.id}"></td>
                <td th:text="${med.name}"></td>
                <td th:text="${med.quantity}"></td>
                <td th:text="${med.expiryDate}"></td>
                <td>
                    <span th:if="${med.isExpired()}" class="text-danger"><i class="bi bi-exclamation-triangle"></i> Expired</span>
                    <span th:elif="${med.isExpiringSoon()}" class="text-warning"><i class="bi bi-hourglass-split"></i> Expiring Soon</span>
                    <span th:unless="${med.isExpired() or med.isExpiringSoon()}" class="text-success"><i class="bi bi-check-circle"></i> Safe</span>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

</body>
</html>
