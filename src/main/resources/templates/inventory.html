<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>PharmaTrack Inventory</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">
<h1 class="mb-4">Pharmacy Inventory (FEFO Sorted)</h1>


<nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container">
        <span class="navbar-brand">PharmaTrack - <span th:text="${pharmacyName}"></span></span>
        <a href="/logout" class="btn btn-outline-light">Logout</a>
    </div>
</nav>

<!-- Add Medicine Form -->
<form th:action="@{/add}" th:object="${newMedicine}" method="post" class="mb-5">
    <div class="row">
        <div class="col-md-4"><input type="text" th:field="*{name}" class="form-control" placeholder="Name" required></div>
        <div class="col-md-3"><input type="number" th:field="*{quantity}" class="form-control" placeholder="Quantity" required></div>
        <div class="col-md-3"><input type="date" th:field="*{expiryDate}" class="form-control" required></div>
        <div class="col-md-2"><button type="submit" class="btn btn-primary">Add</button></div>
    </div>
</form>

<!-- Medicines Table -->
<h2>All Medicines</h2>
<table class="table table-striped">
    <thead><tr><th>ID</th><th>Name</th><th>Quantity</th><th>Expiry Date</th><th>Status</th></tr></thead>
    <tbody>
    <tr th:each="med : ${medicines}"
        th:classappend="${med.isExpired()} ? 'table-danger' : ${med.isExpiringSoon()} ? 'table-warning' : ''">
        <td th:text="${med.id}"></td>
        <td th:text="${med.name}"></td>
        <td th:text="${med.quantity}"></td>
        <td th:text="${med.expiryDate}"></td>
        <td>
            <span th:if="${med.isExpired()}">⚠️ EXPIRED!</span>
            <span th:elif="${med.isExpiringSoon()}">⏰ Expiring Soon!</span>
            <span th:unless="${med.isExpired() or med.isExpiringSoon()}">Safe</span>
        </td>
    </tr>
    </tbody>
</table>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
