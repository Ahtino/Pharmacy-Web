<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>PharmaTrack - Register</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0a1f0f;
            position: relative;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            width: 600px; height: 600px;
            background: radial-gradient(circle, #15803d 0%, transparent 70%);
            top: -200px; right: -200px;
            animation: float1 9s ease-in-out infinite;
            pointer-events: none;
        }
        body::after {
            content: '';
            position: fixed;
            width: 500px; height: 500px;
            background: radial-gradient(circle, #065f46 0%, transparent 70%);
            bottom: -150px; left: -150px;
            animation: float2 11s ease-in-out infinite;
            pointer-events: none;
        }
        @keyframes float1 {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(-50px, 50px); }
        }
        @keyframes float2 {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(50px, -40px); }
        }

        .card-wrapper {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 420px;
            padding: 16px;
        }

        .register-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 24px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            overflow: hidden;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.5);
        }

        .card-top {
            background: linear-gradient(135deg, #166534, #15803d, #059669);
            padding: 36px 32px 28px;
            text-align: center;
        }
        .icon-ring {
            width: 72px; height: 72px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            font-size: 2rem;
            border: 2px solid rgba(255, 255, 255, 0.25);
            box-shadow: 0 0 30px rgba(21, 128, 61, 0.4);
        }
        .card-top h2 {
            color: #fff;
            font-size: 1.65rem;
            font-weight: 700;
            margin-bottom: 4px;
            letter-spacing: -0.02em;
        }
        .card-top p {
            color: rgba(255, 255, 255, 0.65);
            font-size: 0.9rem;
        }

        .card-body-custom {
            padding: 32px;
        }

        .alert-danger-custom {
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.35);
            color: #fca5a5;
            border-radius: 12px;
            padding: 12px 16px;
            margin-bottom: 22px;
            font-size: 0.88rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .field-label {
            color: rgba(255, 255, 255, 0.55);
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.09em;
            text-transform: uppercase;
            margin-bottom: 6px;
            display: block;
        }

        .input-wrap {
            position: relative;
            margin-bottom: 20px;
        }
        .input-wrap .icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #4ade80;
            font-size: 1rem;
            z-index: 2;
        }
        .input-wrap input {
            width: 100%;
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 12px;
            padding: 13px 16px 13px 42px;
            color: #fff;
            font-size: 0.95rem;
            font-family: 'DM Sans', sans-serif;
            transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
            outline: none;
        }
        .input-wrap input::placeholder {
            color: rgba(255, 255, 255, 0.28);
        }
        .input-wrap input:focus {
            border-color: #22c55e;
            background: rgba(34, 197, 94, 0.08);
            box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.12);
        }

        .btn-register {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #16a34a, #059669);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-size: 1rem;
            font-weight: 700;
            font-family: 'DM Sans', sans-serif;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-register:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 28px rgba(22, 163, 74, 0.45);
        }
        .btn-register:active {
            transform: translateY(0);
        }

        .divider {
            text-align: center;
            margin: 24px 0 20px;
            position: relative;
        }
        .divider::before {
            content: '';
            position: absolute;
            top: 50%; left: 0; right: 0;
            height: 1px;
            background: rgba(255, 255, 255, 0.1);
        }
        .divider span {
            position: relative;
            padding: 0 12px;
            color: rgba(255, 255, 255, 0.3);
            font-size: 0.8rem;
        }

        .login-link {
            text-align: center;
        }
        .login-link p {
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.88rem;
            margin-bottom: 8px;
        }
        .login-link a {
            color: #4ade80;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: color 0.2s, gap 0.2s;
        }
        .login-link a:hover {
            color: #86efac;
            gap: 10px;
        }

        .footer-note {
            text-align: center;
            margin-top: 24px;
            color: rgba(255, 255, 255, 0.22);
            font-size: 0.78rem;
            letter-spacing: 0.03em;
        }
    </style>
</head>
<body>

<div class="card-wrapper">
    <div class="register-card">

        <div class="card-top">
            <div class="icon-ring">🌿</div>
            <h2>New Pharmacy</h2>
            <p>Create your PharmaTrack account</p>
        </div>

        <div class="card-body-custom">

            <div th:if="${error != null and !#strings.isEmpty(error)}" class="alert-danger-custom">
                <i class="bi bi-exclamation-triangle-fill"></i>
                <span th:text="${error}"></span>
            </div>

            <form action="/register" method="post" th:object="${pharmacy}">

                <div>
                    <label class="field-label">Pharmacy Name</label>
                    <div class="input-wrap">
                        <span class="icon"><i class="bi bi-shop"></i></span>
                        <input type="text"
                               th:field="*{name}"
                               placeholder="Enter your pharmacy name"
                               required
                               autocomplete="off">
                    </div>
                </div>

                <div>
                    <label class="field-label">Password</label>
                    <div class="input-wrap">
                        <span class="icon"><i class="bi bi-lock-fill"></i></span>
                        <input type="password"
                               th:field="*{password}"
                               placeholder="Create a strong password"
                               required>
                    </div>
                </div>

                <button type="submit" class="btn-register">
                    <i class="bi bi-plus-circle-fill"></i> Register Pharmacy
                </button>
            </form>

            <div class="divider"><span>or</span></div>

            <div class="login-link">
                <p>Already have an account?</p>
                <a href="/login">
                    <i class="bi bi-box-arrow-in-right"></i> Login here
                </a>
            </div>

        </div>
    </div>

    <p class="footer-note">🌱 Start fresh &nbsp;·&nbsp; Manage smart</p>
</div>

</body>
</html>
