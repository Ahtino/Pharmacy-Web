<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>PharmaTrack - Register</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #0f766e, #14b8a6, #22d3ee);
            min-height: 100vh;
            font-family: 'Segoe UI', sans-serif;
        }
        .register-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            overflow: hidden;
        }
        .card-header {
            background: linear-gradient(90deg, #14b8a6, #0ea5e9);
            color: white;
            padding: 25px;
            text-align: center;
        }
        .form-control {
            border-radius: 12px;
            padding-left: 45px;
            height: 52px;
        }
        .input-group-text {
            background: transparent;
            border: none;
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            z-index: 10;
            color: #0f766e;
        }
        .btn-register {
            background: linear-gradient(90deg, #14b8a6, #0ea5e9);
            border: none;
            border-radius: 12px;
            padding: 14px;
            font-size: 1.1rem;
            font-weight: bold;
            transition: all 0.3s;
        }
        .btn-register:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(20, 184, 166, 0.4);
        }
        .emoji {
            font-size: 3.5rem;
            margin-bottom: 10px;
        }
    </style>
</head>
<body class="d-flex align-items-center">

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5">

            <div class="register-card">
                <!-- Cool Header -->
                <div class="card-header">
                    <div class="emoji">💊 🏥</div>
                    <h2 class="mb-0 fw-bold">Register New Pharmacy</h2>
                    <p class="mb-0 opacity-90">Join the PharmaTrack family</p>
                </div>

                <div class="card-body p-5">
                    <div th:if="${error}" class="alert alert-danger d-flex align-items-center">
                        <i class="bi bi-exclamation-triangle-fill me-2"></i>
                        <span th:text="${error}"></span>
                    </div>

                    <form th:action="@{/register}" th:object="${pharmacy}" method="post">

                        <!-- Pharmacy Name -->
                        <div class="mb-4 position-relative">
                            <span class="input-group-text"><i class="bi bi-shop"></i></span>
                            <input type="text" th:field="*{name}"
                                   class="form-control form-control-lg"
                                   placeholder="Pharmacy Name" required>
                        </div>

                        <!-- Password -->
                        <div class="mb-4 position-relative">
                            <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
                            <input type="password" th:field="*{passwordHash}"
                                   class="form-control form-control-lg"
                                   placeholder="Create Strong Password" required>
                        </div>

                        <!-- Register Button -->
                        <button type="submit" class="btn btn-register text-white w-100">
                            <i class="bi bi-plus-circle me-2"></i>
                            Register Pharmacy
                        </button>
                    </form>

                    <!-- Login Link -->
                    <div class="text-center mt-4">
                        <span class="text-muted">Already have an account?</span><br>
                        <a href="/login" class="text-decoration-none fw-bold text-teal">
                            <i class="bi bi-box-arrow-in-right"></i> Login here
                        </a>
                    </div>
                </div>
            </div>

            <!-- Fun footer note -->
            <p class="text-center text-white mt-4 opacity-75">
                <small>💉 Protecting medicines, saving lives</small>
            </p>
        </div>
    </div>
</div>

</body>
</html>
