<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Pharmacy Management</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">
<h1 class="mb-4">Pharmacy Medicines</h1>

<!-- Form to add medicine -->
<form th:action="@{/add}" th:object="${newMedicine}" method="post" class="mb-5">
    <div class="row">
        <div class="col-md-4">
            <input type="text" th:field="*{name}" class="form-control" placeholder="Medicine Name" required>
        </div>
        <div class="col-md-3">
            <input type="date" th:field="*{expirationDate}" class="form-control" required>
        </div>
        <div class="col-md-2">
            <input type="number" th:field="*{quantity}" class="form-control" placeholder="Quantity" required>
        </div>
        <div class="col-md-3">
            <button type="submit" class="btn btn-primary">Add Medicine</button>
        </div>
    </div>
</form>

<!-- List of all medicines -->
<h2>All Medicines</h2>
<table class="table table-striped">
    <thead>
    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Expiration Date</th>
        <th>Quantity</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="medicine : ${medicines}">
        <td th:text="${medicine.id}"></td>
        <td th:text="${medicine.name}"></td>
        <td th:text="${medicine.expirationDate}"></td>
        <td th:text="${medicine.quantity}"></td>
    </tr>
    </tbody>
</table>

<!-- Expiring soon section -->
<h2 class="text-danger">Expiring Soon (within 30 days)</h2>
<ul class="list-group">
    <li th:each="med : ${expiring}" class="list-group-item" th:text="${med.name} + ' expires on ' + ${med.expirationDate}"></li>
</ul>

<!-- Bootstrap JS (optional for interactivity) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
