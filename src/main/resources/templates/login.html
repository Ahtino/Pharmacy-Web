<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>PharmaTrack - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>body { background: linear-gradient(135deg, #667eea, #764ba2); }</style>
</head>
<body class="d-flex align-items-center min-vh-100">
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow-lg">
                <div class="card-body p-5">
                    <h2 class="text-center mb-4 text-primary">PharmaTrack Login</h2>
                    <div th:if="${param.registered}" class="alert alert-success">Registration successful! Please login.</div>
                    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

                    <form th:action="@{/login}" method="post">
                        <div class="mb-3">
                            <input type="text" name="name" class="form-control form-control-lg" placeholder="Pharmacy Name" required>
                        </div>
                        <div class="mb-4">
                            <input type="password" name="password" class="form-control form-control-lg" placeholder="Password" required>
                        </div>
                        <button type="submit" class="btn btn-primary btn-lg w-100">Login</button>
                    </form>

                    <div class="text-center mt-4">
                        <a href="/register" class="text-decoration-none">New pharmacy? Register here</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
