<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>PharmaTrack - Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0f172a;
            position: relative;
            overflow: hidden;
        }

        /* Animated background blobs */
        body::before {
            content: '';
            position: fixed;
            width: 600px; height: 600px;
            background: radial-gradient(circle, #1d4ed8 0%, transparent 70%);
            top: -200px; left: -200px;
            animation: float1 8s ease-in-out infinite;
            pointer-events: none;
        }
        body::after {
            content: '';
            position: fixed;
            width: 500px; height: 500px;
            background: radial-gradient(circle, #0369a1 0%, transparent 70%);
            bottom: -150px; right: -150px;
            animation: float2 10s ease-in-out infinite;
            pointer-events: none;
        }
        @keyframes float1 {
            0%, 100% { transform: translate(0,0); }
            50% { transform: translate(60px, 40px); }
        }
        @keyframes float2 {
            0%, 100% { transform: translate(0,0); }
            50% { transform: translate(-40px, -60px); }
        }

        .card-wrapper {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 420px;
            padding: 16px;
        }

        .login-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 24px;
            backdrop-filter: blur(20px);
            overflow: hidden;
            box-shadow: 0 25px 60px rgba(0,0,0,0.5);
        }

        .card-top {
            background: linear-gradient(135deg, #1d4ed8, #0369a1);
            padding: 36px 32px 28px;
            text-align: center;
        }
        .card-top .icon-ring {
            width: 72px; height: 72px;
            background: rgba(255,255,255,0.15);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 16px;
            font-size: 2rem;
            border: 2px solid rgba(255,255,255,0.25);
        }
        .card-top h2 {
            color: #fff;
            font-size: 1.6rem;
            font-weight: 700;
            margin-bottom: 4px;
        }
        .card-top p {
            color: rgba(255,255,255,0.7);
            font-size: 0.9rem;
        }

        .card-body-custom {
            padding: 32px;
        }

        .alert-success-custom {
            background: rgba(16,185,129,0.15);
            border: 1px solid rgba(16,185,129,0.4);
            color: #6ee7b7;
            border-radius: 12px;
            padding: 12px 16px;
            margin-bottom: 20px;
            font-size: 0.88rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .alert-danger-custom {
            background: rgba(239,68,68,0.15);
            border: 1px solid rgba(239,68,68,0.4);
            color: #fca5a5;
            border-radius: 12px;
            padding: 12px 16px;
            margin-bottom: 20px;
            font-size: 0.88rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .field-label {
            color: rgba(255,255,255,0.6);
            font-size: 0.78rem;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            margin-bottom: 6px;
            display: block;
        }
        .input-wrap {
            position: relative;
            margin-bottom: 20px;
        }
        .input-wrap .icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #60a5fa;
            font-size: 1rem;
            z-index: 2;
        }
        .input-wrap input {
            width: 100%;
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 12px;
            padding: 13px 16px 13px 42px;
            color: #fff;
            font-size: 0.95rem;
            font-family: 'DM Sans', sans-serif;
            transition: border-color 0.2s, background 0.2s;
            outline: none;
        }
        .input-wrap input::placeholder { color: rgba(255,255,255,0.3); }
        .input-wrap input:focus {
            border-color: #3b82f6;
            background: rgba(59,130,246,0.1);
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #2563eb, #0284c7);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-size: 1rem;
            font-weight: 700;
            font-family: 'DM Sans', sans-serif;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 28px rgba(37,99,235,0.5);
        }

        .divider {
            text-align: center;
            margin: 24px 0 20px;
            position: relative;
        }
        .divider::before {
            content: '';
            position: absolute;
            top: 50%; left: 0; right: 0;
            height: 1px;
            background: rgba(255,255,255,0.1);
        }
        .divider span {
            background: transparent;
            position: relative;
            padding: 0 12px;
            color: rgba(255,255,255,0.35);
            font-size: 0.8rem;
        }

        .register-link {
            text-align: center;
        }
        .register-link p {
            color: rgba(255,255,255,0.45);
            font-size: 0.88rem;
            margin-bottom: 8px;
        }
        .register-link a {
            color: #60a5fa;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: color 0.2s;
        }
        .register-link a:hover { color: #93c5fd; }

        .footer-note {
            text-align: center;
            margin-top: 24px;
            color: rgba(255,255,255,0.25);
            font-size: 0.78rem;
        }
    </style>
</head>
<body>

<div class="card-wrapper">
    <div class="login-card">
        <div class="card-top">
            <div class="icon-ring">🛡️</div>
            <h2>PharmaTrack</h2>
            <p>Secure access to your pharmacy</p>
        </div>

        <div class="card-body-custom">

            <!-- Success message after registration -->
            <div th:if="${param.registered != null}" class="alert-success-custom">
                <i class="bi bi-check-circle-fill"></i>
                Registration successful! Please login.
            </div>

            <!-- Error message -->
            <div th:if="${error != null and !#strings.isEmpty(error)}" class="alert-danger-custom">
                <i class="bi bi-exclamation-triangle-fill"></i>
                <span th:text="${error}"></span>
            </div>

            <form action="/login" method="post">
                <div>
                    <label class="field-label">Pharmacy Name</label>
                    <div class="input-wrap">
                        <span class="icon"><i class="bi bi-shop"></i></span>
                        <input type="text" name="name" placeholder="Enter your pharmacy name" required autocomplete="off">
                    </div>
                </div>

                <div>
                    <label class="field-label">Password</label>
                    <div class="input-wrap">
                        <span class="icon"><i class="bi bi-lock-fill"></i></span>
                        <input type="password" name="password" placeholder="Enter your password" required>
                    </div>
                </div>

                <button type="submit" class="btn-login">
                    <i class="bi bi-box-arrow-in-right"></i> Login
                </button>
            </form>

            <div class="divider"><span>or</span></div>

            <div class="register-link">
                <p>New pharmacy?</p>
                <a href="/register">
                    <i class="bi bi-plus-circle"></i> Register here
                </a>
            </div>
        </div>
    </div>

    <p class="footer-note">🔒 Secure · Simple · Smart</p>
</div>

</body>
</html>
