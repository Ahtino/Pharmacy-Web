<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>PharmaTrack — Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Nunito', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;

            background-image:
                    linear-gradient(rgba(15, 30, 60, 0.72), rgba(15, 30, 60, 0.72)),
                    url('https://images.unsplash.com/photo-1584308666744-24d5c474f2ae?w=1600&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        .card-wrap {
            width: 100%;
            max-width: 420px;
            padding: 16px;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.18);
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .card-top {
            background: linear-gradient(135deg, rgba(13,110,253,0.85), rgba(13,202,240,0.85));
            padding: 32px 32px 28px;
            text-align: center;
        }
        .logo-circle {
            width: 60px; height: 60px;
            background: rgba(255,255,255,0.2);
            border: 2px solid rgba(255,255,255,0.4);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 14px;
            font-size: 1.5rem;
            color: #fff;
        }
        .card-top h4 {
            color: #fff;
            font-weight: 700;
            font-size: 1.4rem;
            margin-bottom: 4px;
        }
        .card-top p {
            color: rgba(255,255,255,0.75);
            font-size: 0.87rem;
            margin: 0;
        }

        .card-body-inner { padding: 32px; }

        .alert-custom {
            border-radius: 10px;
            padding: 11px 15px;
            font-size: 0.87rem;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 9px;
        }
        .alert-err {
            background: rgba(220,38,38,0.15);
            border: 1px solid rgba(220,38,38,0.35);
            color: #fca5a5;
        }
        .alert-ok {
            background: rgba(34,197,94,0.15);
            border: 1px solid rgba(34,197,94,0.35);
            color: #86efac;
        }

        .form-label {
            display: block;
            font-size: 0.78rem;
            font-weight: 700;
            color: rgba(255,255,255,0.55);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 6px;
        }
        .input-wrap { position: relative; margin-bottom: 18px; }
        .input-icon {
            position: absolute;
            left: 13px; top: 50%;
            transform: translateY(-50%);
            color: rgba(255,255,255,0.35);
            font-size: 0.95rem;
        }
        .form-input {
            width: 100%;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 10px;
            padding: 11px 14px 11px 38px;
            font-size: 0.93rem;
            font-family: 'Nunito', sans-serif;
            color: #fff;
            background: rgba(255,255,255,0.1);
            outline: none;
            transition: border-color 0.2s, background 0.2s;
            box-sizing: border-box;
        }
        .form-input::placeholder { color: rgba(255,255,255,0.28); }
        .form-input:focus {
            border-color: #38bdf8;
            background: rgba(255,255,255,0.15);
        }

        .btn-login {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #0d6efd, #0dcaf0);
            border: none;
            border-radius: 10px;
            color: #fff;
            font-size: 0.95rem;
            font-weight: 700;
            font-family: 'Nunito', sans-serif;
            cursor: pointer;
            transition: all 0.25s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 4px;
        }
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(13,110,253,0.45);
        }

        .bottom-link {
            text-align: center;
            margin-top: 22px;
            font-size: 0.87rem;
            color: rgba(255,255,255,0.5);
        }
        .bottom-link a {
            color: #38bdf8;
            font-weight: 700;
            text-decoration: none;
        }
        .bottom-link a:hover { text-decoration: underline; }

        .footer-text {
            text-align: center;
            color: rgba(255,255,255,0.35);
            font-size: 0.78rem;
            margin-top: 18px;
        }
    </style>
</head>
<body>

<div class="card-wrap">
    <div class="login-card">

        <div class="card-top">
            <div class="logo-circle">
                <i class="bi bi-capsule-pill"></i>
            </div>
            <h4>PharmaTrack</h4>
            <p>Sign in to manage your inventory</p>
        </div>

        <div class="card-body-inner">

            <div th:if="${param.registered != null}" class="alert-custom alert-ok">
                <i class="bi bi-check-circle-fill"></i>
                Registration successful! Please sign in.
            </div>

            <div th:if="${error != null and !#strings.isEmpty(error)}" class="alert-custom alert-err">
                <i class="bi bi-exclamation-circle-fill"></i>
                <span th:text="${error}"></span>
            </div>

            <form action="/login" method="post">

                <div>
                    <label class="form-label">Pharmacy Name</label>
                    <div class="input-wrap">
                        <span class="input-icon"><i class="bi bi-building"></i></span>
                        <input type="text" name="name" class="form-input"
                               placeholder="Enter pharmacy name" required autocomplete="off">
                    </div>
                </div>

                <div>
                    <label class="form-label">Password</label>
                    <div class="input-wrap">
                        <span class="input-icon"><i class="bi bi-lock-fill"></i></span>
                        <input type="password" name="password" class="form-input"
                               placeholder="Enter password" required>
                    </div>
                </div>

                <button type="submit" class="btn-login">
                    <i class="bi bi-box-arrow-in-right"></i> Sign In
                </button>
            </form>

            <div class="bottom-link">
                New pharmacy? <a href="/register">Register here</a>
            </div>

        </div>
    </div>

    <p class="footer-text">PharmaTrack &copy; 2026 &nbsp;|&nbsp; Pharmacy Inventory Management</p>
</div>

</body>
</html>
