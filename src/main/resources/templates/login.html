<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>PharmaTrack - Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #1e40af, #3b82f6, #60a5fa);
            min-height: 100vh;
            font-family: 'Segoe UI', sans-serif;
        }
        .login-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;  /* Sharper edges */
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            overflow: hidden;
        }
        .card-header {
            background: linear-gradient(90deg, #3b82f6, #1d4ed8);
            color: white;
            padding: 25px;
            text-align: center;
        }
        .form-control {
            border-radius: 8px;  /* Less round */
            padding-left: 45px;
            height: 52px;
        }
        .input-group-text {
            background: transparent;
            border: none;
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            z-index: 10;
            color: #1e40af;
        }
        .btn-login {
            background: linear-gradient(90deg, #3b82f6, #1d4ed8);
            border: none;
            border-radius: 8px;
            padding: 14px;
            font-size: 1.1rem;
            font-weight: bold;
            transition: all 0.3s;
        }
        .btn-login:hover {
            transform: translateX(5px);
            box-shadow: 0 10px 20px rgba(59, 130, 246, 0.4);
        }
        .emoji {
            font-size: 3.5rem;
            margin-bottom: 10px;
        }
    </style>
</head>
<body class="d-flex align-items-center">

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5">

            <div class="login-card">
                <div class="card-header">
                    <div class="emoji">🛡️ 🔑</div>
                    <h2 class="mb-0 fw-bold">PharmaTrack Login</h2>
                    <p class="mb-0 opacity-90">Secure access to your data</p>
                </div>

                <div class="card-body p-5">
                    <div th:if="${param.registered}" class="alert alert-success d-flex align-items-center">
                        <i class="bi bi-check-circle-fill me-2"></i>
                        Registration successful! Please login.
                    </div>
                    <div th:if="${error}" class="alert alert-danger d-flex align-items-center">
                        <i class="bi bi-exclamation-triangle-fill me-2"></i>
                        <span th:text="${error}"></span>
                    </div>

                    <form th:action="@{/login}" method="post">
                        <div class="mb-4 position-relative">
                            <span class="input-group-text"><i class="bi bi-shop"></i></span>
                            <input type="text" name="name" class="form-control form-control-lg" placeholder="Pharmacy Name" required>
                        </div>
                        <div class="mb-4 position-relative">
                            <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
                            <input type="password" name="password" class="form-control form-control-lg" placeholder="Enter Password" required>
                        </div>
                        <button type="submit" class="btn btn-login text-white w-100">
                            <i class="bi bi-box-arrow-in-right me-2"></i> Login
                        </button>
                    </form>

                    <div class="text-center mt-4">
                        <span class="text-muted">New pharmacy?</span><br>
                        <a href="/register" class="text-decoration-none fw-bold text-blue">
                            <i class="bi bi-plus-circle"></i> Register here
                        </a>
                    </div>
                </div>
            </div>

            <p class="text-center text-white mt-4 opacity-75">
                <small>🔒 Secure, Simple, Smart</small>
            </p>
        </div>
    </div>
</div>

</body>
</html>
